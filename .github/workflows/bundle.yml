name: Build bundle

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-bundle:
    runs-on: ubuntu-latest

    steps:
      # No push trigger here: this file exists only on main, so backend/frontend/cli
      # pushes would not run it from those branches.
      - name: Check out main with submodules
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          submodules: true

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Rebuild and push generated bundle
        run: node scripts/build-bundle.mjs --push
